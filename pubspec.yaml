name: vitametric_app
description: "Vitametric — health tracking app (iOS / HealthKit + Android / Health Connect)"
publish_to: 'none'
version: 1.1.0+33

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9

  # Official health package — HealthKit (iOS) + Health Connect (Android)
  health: ^13.3.1

  # Persistent storage for API config
  shared_preferences: ^2.5.5

  # HTTP client for direct Partner API calls (bypass mode)
  http: ^1.2.1

  # Background sync (iOS Background Fetch / Android WorkManager)
  workmanager: ^0.9.0
  fl_chart: ^1.2.0
  url_launcher: ^6.3.0

  # Secure credential storage (iOS Keychain / Android Keystore)
  flutter_secure_storage: ^10.0.0

  # Runtime build metadata (CFBundleShortVersionString / CFBundleVersion).
  # Round-8 replaces the earlier --dart-define plumbing because Xcode
  # archive-from-xcworkspace re-runs the build without those defines and
  # silently labels every TestFlight build "dev" — see tool/build_release.sh.
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tikcare_logo.jpeg
